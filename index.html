<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport">
        <style>
            .ex1 img {clip-path: ellipse(25% 40% at 50% 50%);}
            .ex2 img {
                mask-image: url(images/cHJpdmF0ZS9sci9pbWFnZXMvd2Vic2l0ZS8yMDIzLTAyL3YzNzEtYWV3LTEwNy1oYWxmdG9uZS0xNzM2LnBuZw\ \(1\).webp);

                -webkit-mask-image:url(images/cHJpdmF0ZS9sci9pbWFnZXMvd2Vic2l0ZS8yMDIzLTAyL3YzNzEtYWV3LTEwNy1oYWxmdG9uZS0xNzM2LnBuZw\ \(1\).webp);

                mask-repeat: no-repeat;
                mask-position: center;
            }
            .ex3 img {
                background-blend-mode:soft-light;
                background-color: darksalmon;
                background-size: cover;
            }
            .ex4 img {
                float: left;
                height: 200px;
                width: 200px;
                shape-margin: 1rem;
                shape-outside: circle(30%);
                clip-path: circle(25% 30% at 50% 50%);
            }
        </style>
    </head>

    <body>
        <h1>Lab 4</h1>
            <figure class="ex1">
                <img src="images/pexels-davidohboy-15578740.1.png" alt="demo image, image of sheep">
            </figure>    
                <figcaption>Example 1: Clip Path</figcaption>
                <hr>
            <figure class="ex2">
                <img src="images/pexels-duc-nguyen-400576574-33952475 (1).jpg" alt="demo 2 image, image of landscape">
            </figure>
                <figcaption>Example 2: Masking</figcaption>
                <hr>
            <figure class="ex3">
                <img src="images/pexels-janetrangdoan-1092730 (1).jpg" alt="demo 3 image, smoothie bowl surrounded by assortment of fruit around it">
            </figure>
                <figcaption>Example 3: Blending</figcaption>
                <hr>
            <figure class="ex4">
                <img src="images/pexels-pixabay-67857 (1).jpg" alt="demo image 4, close up image of daisies">
                    <p>Sample text. This is a close up image of daisies. They are white daisies surrounded by leaves and grass. The leaves are a pretty shade of green, and so is the grass. This is an example of using a clip path to let text shape around the image in a funa nd creative way.</p>
            </figure>
                <figcaption>Example 4: Shape Outside</figcaption>
    </body>

</html>
